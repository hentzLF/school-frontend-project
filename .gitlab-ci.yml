# GitLab CI/CD pipeline for the AgriMarket frontend.
# Pipeline: verify (lint + unit tests) -> build (Docker image) -> deploy.

stages:
  - verify
  - build
  - deploy

variables:
  NEXT_TELEMETRY_DISABLED: "1"

# ---- Verify: lint and unit tests ----
verify:
  stage: verify
  tags:
    - shared
  before_script:
    - curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
    - sudo apt-get install -y nodejs
  script:
    - npm ci
    - npm run lint
    - npm run test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ---- Build: build Docker image ----
build:
  stage: build
  tags:
    - shared
  script:
    - docker compose build
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---- Deploy: roll out the latest image ----
deploy:
  stage: deploy
  tags:
    - shared
  environment:
    name: production
  script:
    - echo "BACKEND_URL=${BACKEND_URL}" > .env
    - docker compose down
    - docker compose up -d
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual